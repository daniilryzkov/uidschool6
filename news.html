<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости ПДД | ПДД Тест</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/news.css">
</head>
<body>

    <div class="header">
        <div class="container">
            <div class="logo">
                <img src="assets/logo.jpg" alt="Логотип" class="logo-img">
                <span>ПДД ТЕСТ</span>
            </div>
            <div class="nav">
                <a href="index.html">Главная</a>
                <a href="quiz.html">Тесты</a>
                <a href="profile.html">Профиль</a>
                <a href="news.html" class="active">Новости</a>
            </div>
            <div class="auth" id="authSection">
                <button class="btn-login" onclick="window.location.href='index.html'">Войти</button>
            </div>
        </div>
    </div>

    <div class="news-container">
        <div class="news-header">
            <h1>Новости ПДД</h1>
            <p>Актуальные изменения и события в мире дорожного движения</p>
        </div>

        <div class="news-filter">
            <button class="filter-btn active" data-filter="all">Все новости</button>
            <button class="filter-btn" data-filter="laws">Изменения в законах</button>
            <button class="filter-btn" data-filter="safety">Безопасность</button>
            <button class="filter-btn" data-filter="technology">Технологии</button>
            <button class="filter-btn" data-filter="events">События</button>
        </div>

        <div class="news-grid" id="newsGrid"></div>

        <div class="news-load-more" id="loadMoreBlock">
            <button class="btn-green" id="loadMoreBtn">Загрузить ещё</button>
        </div>
    </div>

    <!-- Модальное окно для новости -->
    <div class="modal news-modal" id="newsModal">
        <div class="modal-bg"></div>
        <div class="modal-box news-modal-box">
            <div class="modal-header">
                <span id="newsModalCategory"></span>
                <button class="modal-close" id="closeNewsModal">×</button>
            </div>
            <div class="modal-body news-modal-body">
                <img id="newsModalImage" src="" alt="" class="news-modal-image">
                <h2 id="newsModalTitle"></h2>
                <div class="news-modal-meta">
                    <span id="newsModalDate"></span>
                </div>
                <div class="news-modal-content" id="newsModalContent"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p>© 2026 ПДД Тест. Все права защищены.</p>
            <div class="footer-links">
                <a href="#">О проекте</a>
                <a href="#">Контакты</a>
            </div>
        </div>
    </div>

    <script src="js/services/ApiService.js"></script>
    <script src="js/news.js"></script>
    <script src="js/transitions.js"></script>
</body>
</html>
